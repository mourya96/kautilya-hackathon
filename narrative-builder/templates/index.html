<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Narrative Builder</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body { background: #f5f5f5; }
        .result-box {
            white-space: pre-wrap;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="mb-3">📰 Narrative Builder – Web UI</h2>

    <form id="narrativeForm">
        <div class="mb-3">
            <label class="form-label">Topic</label>
            <input type="text" class="form-control" name="topic" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Minimum Rating</label>
            <input type="number" step="0.1" class="form-control"
                   name="min_rating" placeholder="0.0 (default)">
        </div>

        <div class="mb-3">
            <label class="form-label">Dataset File (optional)</label>
            <input type="file" class="form-control" name="dataset">
        </div>

        <button class="btn btn-primary" type="submit">Generate Narrative</button>
    </form>

    <div id="loading" class="mt-3 text-info" style="display: none;">
        Processing... please wait.
    </div>

    <div id="output"></div>
</div>

<script>
document.getElementById("narrativeForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(this);
    document.getElementById("loading").style.display = "block";

    const res = await fetch("/generate", {
        method: "POST",
        body: formData,
    });

    const data = await res.json();
    document.getElementById("loading").style.display = "none";

    if (!data.success) {
        document.getElementById("output").innerHTML =
                `<div class="alert alert-danger">${data.error}</div>`;
        return;
    }

    document.getElementById("output").innerHTML = `
        <h4>✔ Narrative Generated</h4>
        <p><b>Articles Used:</b> ${data.article_count}</p>
        <p><b>Processing Time:</b> ${data.processing_time}s</p>
        <div class="result-box">
            <pre>${JSON.stringify(data.narrative, null, 2)}</pre>
        </div>
    `;
});
</script>

</body>
</html>
